<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>ProdMemo Data</title>
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f4f4;
      color: #333;
      max-height: 500px;
      overflow-y: auto;
    }

    h3 {
      margin-top: 0;
      color: #00bc8c;
      border-bottom: 2px solid #ddd;
      padding-bottom: 10px;
    }

    .stats {
      margin-bottom: 15px;
      font-size: 14px;
    }

    .sync-progress {
      margin-bottom: 10px;
      padding: 8px;
      background: white;
      border-radius: 4px;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-line;
    }

    .btn-sync {
      background-color: #8e44ad;
      color: white;
    }

    .btn-sync:hover {
      background-color: #71368a;
    }

    .btn-sync:disabled {
      background-color: #aaa;
      cursor: not-allowed;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-bottom: 5px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.2s;
    }

    .btn-export {
      background-color: #00bc8c;
      color: white;
    }

    .btn-export:hover {
      background-color: #008f6b;
    }

    .btn-import {
      background-color: #3498db;
      color: white;
    }

    .btn-import:hover {
      background-color: #2980b9;
    }

    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
      text-align: center;
      min-height: 16px;
    }
  </style>
</head>

<body>
  <h3>ProdMemo</h3>

  <div class="stats">
    Prod Corr records: <strong id="record-count">...</strong>
    <br>Submitted Alphas: <strong id="alpha-count">...</strong>
    <br>IndexedDB PnLs: <strong id="pnl-count">...</strong>
  </div>

  <div id="sync-progress" class="sync-progress">Sync idle.</div>

  <button id="full-sync-btn" class="btn-sync">🔄 Full Submitted Alpha + PnL Sync</button>
  <button id="export-btn" class="btn-export">📥 Export Prod Corr Data</button>
  <button id="import-btn" class="btn-import">📤 Import Prod Corr Data</button>
  <input type="file" id="import-file" accept=".json" style="display: none;">
  <div id="status"></div>
  <script src="popup.js"></script>
</body>

</html>
